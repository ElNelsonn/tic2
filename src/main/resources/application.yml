spring:

  application:
    name: backend


  datasource:
    url: jdbc:postgresql://localhost:5432/cascardo_db
    driver-class-name: org.postgresql.Driver
    username: cascardo_user
    password: cascardo_pass

  jpa:
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false

